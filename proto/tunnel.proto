syntax = "proto3";

package tunnel.v1;

option go_package = "github.com/define42/muxbridge/gen/tunnelpb;tunnelpb";

service TunnelService {
  rpc Connect(stream ClientFrame) returns (stream ServerFrame);
}

message Header {
  string key = 1;
  repeated string values = 2;
}

message Register {
  string tunnel_id = 1;
  string token = 2;
}

message Ping {
  int64 unix_nano = 1;
}

message Pong {
  int64 unix_nano = 1;
}

message RequestStart {
  string request_id = 1;
  string method = 2;
  string scheme = 3;
  string host = 4;
  string path = 5;
  string raw_query = 6;
  repeated Header headers = 7;
  string remote_addr = 8;
}

message RequestBody {
  string request_id = 1;
  bytes chunk = 2;
}

message RequestEnd {
  string request_id = 1;
}

message CancelRequest {
  string request_id = 1;
}

message WebSocketData {
  string request_id = 1;
  bytes payload = 2;
}

message WebSocketClose {
  string request_id = 1;
}

message ResponseStart {
  string request_id = 1;
  int32 status_code = 2;
  repeated Header headers = 3;
}

message ResponseBody {
  string request_id = 1;
  bytes chunk = 2;
}

message ResponseEnd {
  string request_id = 1;
}

message ResponseError {
  string request_id = 1;
  string message = 2;
}

message ClientFrame {
  oneof msg {
    Register register = 1;
    Pong pong = 2;
    ResponseStart response_start = 3;
    ResponseBody response_body = 4;
    ResponseEnd response_end = 5;
    ResponseError response_error = 6;
    WebSocketData ws_data = 7;
    WebSocketClose ws_close = 8;
  }
}

message ServerFrame {
  oneof msg {
    RequestStart request_start = 1;
    RequestBody request_body = 2;
    RequestEnd request_end = 3;
    CancelRequest cancel_request = 4;
    Ping ping = 5;
    WebSocketData ws_data = 6;
    WebSocketClose ws_close = 7;
  }
}
